<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:"Space Mono",ui-monospace,monospace;background:#efeed0;color:#2c2416;padding:20px}
  .row{display:grid;grid-template-columns:120px 1fr;gap:14px;padding:8px 0;border-bottom:1px solid #b8a878}
  .row:last-child{border-bottom:0}
  .meta{font-size:9px;color:#8a7e6a;letter-spacing:.05em;text-transform:uppercase;align-self:center}
</style>
</head>
<body>
<div>
  <div class="row"><div class="meta">13 / TITLE</div><div style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.05em">MODAL TITLE BAR</div></div>
  <div class="row"><div class="meta">11 / BODY</div><div style="font-size:11px">The base plate is pre-famulated. Proceeding with deployment.</div></div>
  <div class="row"><div class="meta">11 / INPUT</div><div style="font-size:11px;color:#8a7e6a">Type your command…</div></div>
  <div class="row"><div class="meta">10 / LABEL</div><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em">USERNAME</div></div>
  <div class="row"><div class="meta">9 / TIME</div><div style="font-size:9px;color:#8a7e6a;text-transform:uppercase;letter-spacing:.05em">10:47 AM • 2 MIN AGO</div></div>
  <div class="row"><div class="meta">11 / BUTTON</div><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em">DEPLOY ▌</div></div>
</div>
</body>
</html>
