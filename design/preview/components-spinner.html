<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:"Space Mono",ui-monospace,monospace;background:#efeed0;color:#2c2416;padding:18px;font-size:11px}
  .label{font-size:9px;color:#8a7e6a;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
  .row{display:flex;gap:24px;align-items:center;margin-bottom:18px;flex-wrap:wrap}
  /* Square block spinner — steps(8) for that scanline / terminal feel */
  .spin-block{width:24px;height:24px;border:2px solid #2c2416;background:#efeed0;position:relative;overflow:hidden}
  .spin-block::after{content:'';position:absolute;left:0;top:0;width:50%;height:100%;background:#2c2416;animation:rot 1s steps(8,end) infinite;transform-origin:right center}
  @keyframes rot { to { transform:rotate(360deg) } }
  /* Ring */
  .ring{width:22px;height:22px;border:2px solid #2c2416;border-right-color:transparent;border-radius:50%;animation:r 600ms linear infinite}
  @keyframes r { to{transform:rotate(360deg)} }
  /* Dots */
  .dots{display:inline-flex;gap:4px}
  .dots span{width:7px;height:7px;background:#2c2416;border-radius:1px;animation:b 1s steps(2,end) infinite}
  .dots span:nth-child(2){animation-delay:.16s}
  .dots span:nth-child(3){animation-delay:.32s}
  @keyframes b { 0%,40%{opacity:1} 50%,100%{opacity:.2} }
  /* Bar / linear progress */
  .bar{width:200px;height:8px;border:2px solid #2c2416;background:#efeed0;position:relative;overflow:hidden;border-radius:2px}
  .bar::after{content:'';position:absolute;left:0;top:0;bottom:0;width:35%;background:#CC6622}
  .bar.indet::after{animation:slide 1.2s ease-in-out infinite}
  @keyframes slide { 0%{left:-35%} 100%{left:100%} }
  /* Skeleton */
  .skel{height:10px;background:linear-gradient(90deg,#f2ecda 25%,#e8e2c9 50%,#f2ecda 75%);background-size:200% 100%;animation:sh 1.4s linear infinite;border-radius:1px;border:1px solid #b8a878}
  @keyframes sh { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  .stack{display:flex;flex-direction:column;gap:6px;width:240px}
  .stamp{font-size:9px;color:#8a7e6a;text-transform:uppercase;letter-spacing:.06em}
</style>
</head>
<body>
<div class="label">// SPINNERS — steps() easing for that terminal feel</div>
<div class="row">
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px"><div class="spin-block"></div><div class="stamp">block · steps(8)</div></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px"><div class="ring"></div><div class="stamp">ring · linear</div></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px"><div class="dots"><span></span><span></span><span></span></div><div class="stamp">dots · steps(2)</div></div>
</div>

<div class="label">// PROGRESS BARS — determinate + indeterminate</div>
<div class="row">
  <div class="stack"><div class="bar"></div><div class="stamp">35% · determinate</div></div>
  <div class="stack"><div class="bar indet" style="--w:35%"><style></style></div><div class="stamp">indeterminate</div></div>
</div>

<div class="label">// SKELETON — for cards, tables, rows</div>
<div class="stack" style="width:280px">
  <div class="skel" style="width:60%;height:14px"></div>
  <div class="skel"></div>
  <div class="skel" style="width:80%"></div>
</div>
</body>
</html>
