<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:"Space Mono",ui-monospace,monospace;background:#efeed0;color:#2c2416;padding:20px}
  .stack{display:flex;flex-direction:column;gap:8px}
  .row{display:flex;align-items:baseline;gap:14px;border-bottom:1px solid #b8a878;padding-bottom:6px}
  .row:last-child{border-bottom:0}
  .meta{font-size:9px;color:#8a7e6a;width:90px;flex-shrink:0;letter-spacing:.05em;text-transform:uppercase}
  .label{font-weight:700;text-transform:uppercase;letter-spacing:.05em;line-height:1.1}
</style>
</head>
<body>
<div class="stack">
  <div class="row"><div class="meta">H1 / 44PX</div><div class="label" style="font-size:44px">HESPERUS</div></div>
  <div class="row"><div class="meta">H2 / 32PX</div><div class="label" style="font-size:32px">EVENING STAR</div></div>
  <div class="row"><div class="meta">H3 / 24PX</div><div class="label" style="font-size:24px">RETRO TERMINAL</div></div>
  <div class="row"><div class="meta">H4 / 20PX</div><div class="label" style="font-size:20px">PHOSPHOR & PAPER</div></div>
</div>
</body>
</html>
