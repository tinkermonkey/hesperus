<!doctype html>
<html lang="en">

<meta charset="utf-8" />
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:"Space Mono",monospace;background:#efeed0;color:#2c2416;padding:18px;font-size:11px}
  .label{font-size:9px;color:#8a7e6a;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
  .grid{display:grid;grid-template-columns:repeat(8,1fr);gap:10px;margin-bottom:14px}
  .ic{display:flex;flex-direction:column;align-items:center;gap:4px;border:2px solid #2c2416;border-radius:3px;padding:8px 4px;background:#efeed0}
  .ic svg{stroke:#2c2416}
  .name{font-size:8px;letter-spacing:.05em;text-transform:uppercase;color:#8a7e6a}
  .ascii-row{display:flex;gap:14px;font-size:14px;font-weight:700;letter-spacing:.2em}
</style>
</head>
