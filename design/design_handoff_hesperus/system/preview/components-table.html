<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:"Space Mono",monospace;background:#efeed0;color:#2c2416;padding:18px;font-size:11px}
  .wrap{border:2px solid #2c2416;border-radius:4px;overflow:hidden}
  table{width:100%;border-collapse:collapse;font-size:11px}
  th{background:#2c2416;color:#efeed0;text-align:left;padding:8px 12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;border-right:1px solid #efeed0}
  th:last-child{border-right:0}
  td{padding:9px 12px;border-bottom:1px solid #2c2416;border-right:1px solid #2c2416}
  td:last-child{border-right:0}
  tr:last-child td{border-bottom:0}
  tr:hover td{background:#f2ecda}
  .pill{font-size:9px;border:2px solid var(--c);color:var(--c);padding:1px 6px;border-radius:2px;text-transform:uppercase;letter-spacing:.05em;font-weight:700}
</style>
</head>
<body>
<div class="wrap">
  <table>
    <thead><tr><th style="width:60px">ID</th><th>NODE</th><th>SECTOR</th><th>STATUS</th><th>UPTIME</th></tr></thead>
    <tbody>
      <tr><td>001</td><td>retro-encabulator-01</td><td>7G</td><td><span class="pill" style="--c:#5C7A28">ONLINE</span></td><td>412d</td></tr>
      <tr><td>002</td><td>phosphor-glow-mk2</td><td>7G</td><td><span class="pill" style="--c:#5C7A28">ONLINE</span></td><td>118d</td></tr>
      <tr><td>003</td><td>amulite-base-plate</td><td>12</td><td><span class="pill" style="--c:#C4A232">DEGRADED</span></td><td>22d</td></tr>
      <tr><td>004</td><td>logarithmic-casing</td><td>12</td><td><span class="pill" style="--c:#AA3322">OFFLINE</span></td><td>0d</td></tr>
    </tbody>
  </table>
</div>
</body>
</html>
