<!-- Hesperus card boilerplate (light mode) -->
<!-- Copy/paste this when building new preview cards. -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Hesperus card</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --retro-bg:#efeed0; --retro-fg:#2c2416; --retro-muted:#f2ecda;
    --retro-muted-fg:#8a7e6a; --retro-border:#b8a878; --retro-secondary:#f2ecda;
    --retro-error:#AA3322; --retro-success:#5C7A28; --retro-warning:#C4A232;
    --retro-info:#5566AA; --retro-orange:#CC6622; --retro-purple:#7744AA;
    --retro-cyan:#2E8B8B;
  }
  *,*::before,*::after { box-sizing: border-box; }
  html, body { margin:0; padding:0; }
  body {
    font-family:"Space Mono","Fira Code",ui-monospace,monospace;
    background: var(--retro-bg);
    color: var(--retro-fg);
    font-size:11px;
    line-height:1.5;
    -webkit-font-smoothing: antialiased;
    padding: 16px;
  }
  h1,h2,h3,h4,h5,h6 { text-transform:uppercase; letter-spacing:.05em; font-weight:700; margin:0; }
</style>
</head>
<body>
  <!-- card content here -->
</body>
</html>
