<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:"Space Mono",ui-monospace,monospace;background:#efeed0;color:#2c2416;padding:18px;font-size:11px}
  .label{font-size:9px;color:#8a7e6a;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
  .row{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .btn{font-family:"Space Mono",monospace;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.05em;height:36px;padding:0 14px;border:2px solid #2c2416;background:#efeed0;color:#2c2416;border-radius:4px;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:background-color 150ms,color 150ms}
  .btn:hover{background:#2c2416;color:#efeed0}
  .btn-ghost{border-color:#8a7e6a;color:#8a7e6a}
  .btn-ghost:hover{background:transparent;border-color:#2c2416;color:#2c2416}
  .btn-destructive{border-color:#AA3322;color:#AA3322}
  .btn-destructive:hover{background:#AA3322;color:#efeed0}
  .btn-sm{height:26px;padding:0 12px;font-size:9px;border-radius:3px}
  .btn-flipped{background:#2c2416;color:#efeed0}
</style>
</head>
<body>
<div class="label">// VARIANTS — primary / outline (alias) / ghost / destructive</div>
<div class="row">
  <button class="btn">PRIMARY</button>
  <button class="btn">OUTLINE</button>
  <button class="btn btn-ghost">GHOST</button>
  <button class="btn btn-destructive">DESTRUCTIVE</button>
  <button class="btn btn-flipped">↳ HOVER STATE</button>
</div>
<div class="label">// SIZES — sm (h-26 / text-9) and md (h-36 / text-11)</div>
<div class="row">
  <button class="btn btn-sm">SM</button>
  <button class="btn">MD</button>
  <button class="btn"><span>▶</span>WITH ICON</button>
</div>
</body>
</html>
