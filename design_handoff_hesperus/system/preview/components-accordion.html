<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:"Space Mono",ui-monospace,monospace;background:#efeed0;color:#2c2416;padding:18px;font-size:11px}
  .label{font-size:9px;color:#8a7e6a;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
  .acc{border:2px solid #2c2416;border-radius:4px;background:#efeed0;max-width:520px}
  .ai{border-bottom:2px solid #2c2416}
  .ai:last-child{border-bottom:0}
  .ahead{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;cursor:pointer;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.06em}
  .ai.open .ahead{background:#2c2416;color:#efeed0}
  .ai.open .ahead .chev{transform:rotate(90deg)}
  .chev{transition:transform 150ms cubic-bezier(0.2,0.8,0.2,1);font-size:10px}
  .abody{padding:10px 12px;font-size:11px;line-height:1.6;border-top:1px solid #2c2416}
</style>
</head>
<body>
<div class="label">// ACCORDION — first item open, hard borders, dark band on open header</div>
<div class="acc">
  <div class="ai open">
    <div class="ahead">▌WHAT IS HESPERUS? <span class="chev">▶</span></div>
    <div class="abody">A retro-CRT graph database UI. Schema editor, log viewer, IRC-style chat — all on warm beige paper or vintage charcoal terminal.</div>
  </div>
  <div class="ai">
    <div class="ahead">HOW DOES PRICING WORK? <span class="chev">▶</span></div>
  </div>
  <div class="ai">
    <div class="ahead">CAN I INTEGRATE? <span class="chev">▶</span></div>
  </div>
  <div class="ai">
    <div class="ahead">SUPPORTED BROWSERS <span class="chev">▶</span></div>
  </div>
</div>
</body>
</html>
