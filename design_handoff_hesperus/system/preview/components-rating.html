<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:"Space Mono",ui-monospace,monospace;background:#efeed0;color:#2c2416;padding:18px;font-size:11px}
  .label{font-size:9px;color:#8a7e6a;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
  .row{display:flex;gap:24px;align-items:center;margin-bottom:18px;flex-wrap:wrap}
  .stamp{font-size:8px;color:#8a7e6a;text-transform:uppercase;letter-spacing:.06em;margin-top:4px}
  .stack{display:flex;flex-direction:column}

  .stars{display:inline-flex;gap:3px;align-items:center}
  /* Star shape via clip-path */
  .star{display:inline-block;width:16px;height:16px;background:#8a7e6a;clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%)}
  .star.filled{background:#C4A232}
  .stars.sm .star{width:13px;height:13px}
  .stars.lg .star{width:22px;height:22px}

  .count{font-size:10px;color:#8a7e6a;margin-left:4px}
</style>
</head>
<body>
<div class="label">// RATING — filled = --retro-warning (#C4A232). empty = --retro-muted-fg</div>
<div class="row">
  <div class="stack">
    <div class="stars">
      <span class="star filled"></span><span class="star filled"></span><span class="star filled"></span>
      <span class="star"></span><span class="star"></span>
      <span class="count">3 / 5</span>
    </div>
    <div class="stamp">3 of 5</div>
  </div>

  <div class="stack">
    <div class="stars">
      <span class="star filled"></span><span class="star filled"></span><span class="star filled"></span>
      <span class="star filled"></span><span class="star filled"></span>
      <span class="count">5 / 5</span>
    </div>
    <div class="stamp">5 of 5</div>
  </div>

  <div class="stack">
    <div class="stars">
      <span class="star filled"></span>
      <span class="star"></span><span class="star"></span><span class="star"></span><span class="star"></span>
      <span class="count">1 / 5</span>
    </div>
    <div class="stamp">1 of 5</div>
  </div>

  <div class="stack">
    <div class="stars">
      <span class="star"></span><span class="star"></span><span class="star"></span>
      <span class="star"></span><span class="star"></span>
    </div>
    <div class="stamp">0 of 5</div>
  </div>
</div>

<div class="label">// SIZES — sm / md (default) / lg</div>
<div class="row">
  <div class="stack">
    <div class="stars sm">
      <span class="star filled"></span><span class="star filled"></span><span class="star filled"></span>
      <span class="star"></span><span class="star"></span>
    </div>
    <div class="stamp">sm · 13px</div>
  </div>

  <div class="stack">
    <div class="stars">
      <span class="star filled"></span><span class="star filled"></span><span class="star filled"></span>
      <span class="star"></span><span class="star"></span>
    </div>
    <div class="stamp">md · 16px</div>
  </div>

  <div class="stack">
    <div class="stars lg">
      <span class="star filled"></span><span class="star filled"></span><span class="star filled"></span>
      <span class="star"></span><span class="star"></span>
    </div>
    <div class="stamp">lg · 22px</div>
  </div>
</div>
</body>
</html>
