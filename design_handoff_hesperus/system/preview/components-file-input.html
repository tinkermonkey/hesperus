<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:"Space Mono",ui-monospace,monospace;background:#efeed0;color:#2c2416;padding:18px;font-size:11px}
  .label{font-size:9px;color:#8a7e6a;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
  .row{display:flex;gap:24px;align-items:flex-start;margin-bottom:18px;flex-wrap:wrap}
  .stamp{font-size:8px;color:#8a7e6a;text-transform:uppercase;letter-spacing:.06em;margin-top:4px}

  .file-row{display:flex;align-items:center;gap:8px;font-size:11px}
  .choose{font-family:inherit;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;height:26px;padding:0 14px;border:2px solid #2c2416;background:#efeed0;color:#2c2416;border-radius:3px;cursor:pointer;flex-shrink:0;transition:background 100ms,color 100ms}
  .choose:hover{background:#2c2416;color:#efeed0}
  .filename{color:#8a7e6a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;font-size:11px}
  .filename.selected{color:#2c2416}
  .disabled .choose{opacity:.4;cursor:not-allowed}
  .disabled .choose:hover{background:#efeed0;color:#2c2416}
  .disabled .filename{opacity:.4}
</style>
</head>
<body>
<div class="label">// FILE INPUT — empty / selected / multiple / disabled</div>
<div class="row">
  <div>
    <div class="file-row">
      <button class="choose">Choose File</button>
      <span class="filename">No file chosen</span>
    </div>
    <div class="stamp">empty</div>
  </div>

  <div>
    <div class="file-row">
      <button class="choose">Choose File</button>
      <span class="filename selected">retro-encabulator-config.json</span>
    </div>
    <div class="stamp">file selected</div>
  </div>
</div>

<div class="row">
  <div>
    <div class="file-row">
      <button class="choose">Choose Files</button>
      <span class="filename selected">3 files selected</span>
    </div>
    <div class="stamp">multiple selected</div>
  </div>

  <div class="disabled">
    <div class="file-row">
      <button class="choose" disabled>Choose File</button>
      <span class="filename">No file chosen</span>
    </div>
    <div class="stamp">disabled</div>
  </div>
</div>
</body>
</html>
