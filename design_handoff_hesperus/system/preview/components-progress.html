<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:"Space Mono",monospace;background:#efeed0;color:#2c2416;padding:18px;font-size:11px}
  .label{font-size:9px;color:#8a7e6a;text-transform:uppercase;letter-spacing:.06em;margin:0 0 6px}
  .row{display:flex;gap:24px;align-items:flex-end;margin-bottom:14px}
  .stack{flex:1;display:flex;flex-direction:column;gap:14px}
  .progress{width:100%;height:10px;background:#f2ecda;border-radius:2px;overflow:hidden}
  .bar{height:100%;background:#2c2416}
  .head{display:flex;justify-content:space-between;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
  .spinner{width:32px;height:32px;border:3px solid #2c2416;border-right-color:transparent;border-radius:50%;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .dots{font-size:11px;letter-spacing:.4em}
</style>
</head>
<body>
<div class="row">
  <div class="stack">
    <div>
      <div class="label">// CPU LOAD</div>
      <div class="head"><span>CPU</span><span>34%</span></div>
      <div class="progress"><div class="bar" style="width:34%"></div></div>
    </div>
    <div>
      <div class="label">// MEMORY</div>
      <div class="head"><span>MEM</span><span>72%</span></div>
      <div class="progress"><div class="bar" style="width:72%;background:#C4A232"></div></div>
    </div>
    <div>
      <div class="label">// DISK</div>
      <div class="head"><span>DISK</span><span>91%</span></div>
      <div class="progress"><div class="bar" style="width:91%;background:#AA3322"></div></div>
    </div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:10px">
    <div class="spinner"></div>
    <div class="label" style="margin:0">// LOADING</div>
    <div class="dots">▌ ▌ ▌</div>
  </div>
</div>
</body>
</html>
