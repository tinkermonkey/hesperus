<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Hesperus — Graph Viewer</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
  .graph-shell{display:grid;grid-template-rows:auto auto 1fr;height:100vh;gap:14px;padding:14px}
  /* Toolbar — chunky labeled buttons like the inspiration */
  .gtoolbar{display:flex;gap:14px;align-items:stretch}
  .tool-btn{display:flex;align-items:center;gap:12px;padding:10px 16px;border:2px solid var(--retro-fg);background:var(--retro-bg);color:var(--retro-fg);border-radius:4px;font-family:inherit;font-weight:700;font-size:13px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:background 150ms,color 150ms}
  .tool-btn:hover{background:var(--retro-fg);color:var(--retro-bg)}
  .tool-btn.active{background:var(--retro-fg);color:var(--retro-bg)}
  .tool-btn .ic{width:24px;height:24px;border:2px solid currentColor;border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:transparent}
  .tool-btn:hover .ic, .tool-btn.active .ic{border-color:var(--retro-bg)}
  .tool-spacer{flex:1}
  .tool-icon-only{padding:10px;width:44px;justify-content:center}

  /* Canvas */
  .gcanvas{position:relative;border:2px solid var(--retro-fg);border-radius:4px;overflow:hidden;background:var(--retro-bg)}
  .gcanvas-bg{position:absolute;inset:0;background-image:url("../../public/grid-background-light.svg");background-repeat:repeat}
  .dark .gcanvas-bg{background-image:url("../../public/grid-background-dark.svg")}
  .gcanvas-inner{position:absolute;inset:0}

  /* Edges layer */
  .edges{position:absolute;inset:0;pointer-events:none}

  /* Node */
  .node{position:absolute;border:2px solid var(--retro-fg);background:var(--retro-bg);border-radius:6px;min-width:108px;text-align:center;font-family:inherit;cursor:grab;user-select:none;box-shadow:3px 3px 0 var(--retro-fg);overflow:hidden;z-index:2}
  .node:hover{box-shadow:5px 5px 0 var(--retro-fg);transform:translate(-1px,-1px)}
  .node.selected{outline:3px dashed var(--retro-orange);outline-offset:3px}
  .node .nhead{padding:6px 12px 4px;border-bottom:2px solid var(--retro-fg);font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:.06em;background:var(--retro-bg)}
  .node .nattr{padding:3px 12px;font-size:11px;color:var(--retro-fg);border-bottom:1px solid var(--retro-border)}
  .node .nattr:last-child{border-bottom:0}

  /* Components label box */
  .comp-box{position:absolute;top:14px;left:14px;border:2px solid var(--retro-fg);background:var(--retro-bg);border-radius:4px;padding:10px 14px;font-size:11px;line-height:1.6;z-index:3;box-shadow:3px 3px 0 var(--retro-fg)}
  .comp-box .lbl{font-size:9px;color:var(--retro-muted-fg);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
  .comp-box code{font-family:inherit;display:block;color:var(--retro-fg)}

  /* Inspector — bottom right */
  .inspector{position:absolute;right:14px;bottom:14px;width:260px;border:2px solid var(--retro-fg);background:var(--retro-bg);border-radius:4px;z-index:3;box-shadow:4px 4px 0 var(--retro-fg)}
  .inspector .ihead{background:var(--retro-fg);color:var(--retro-bg);padding:7px 12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;display:flex;justify-content:space-between;align-items:center}
  .inspector .ibody{padding:10px 12px;display:flex;flex-direction:column;gap:8px}
  .inspector .row-kv{display:flex;justify-content:space-between;font-size:11px}
  .inspector .row-kv b{font-weight:400;color:var(--retro-muted-fg);text-transform:uppercase;letter-spacing:.05em;font-size:10px}
  .inspector input.input{padding:5px 8px;font-size:11px}

  /* Edge label pill — sits on the edge with colored bg matching the line */
  .elabel{position:absolute;font-size:10px;font-weight:700;letter-spacing:.06em;padding:2px 8px;color:var(--retro-bg);border-radius:2px;white-space:nowrap;pointer-events:none;z-index:1;font-family:inherit}

  /* Statusbar */
  .statusbar{position:absolute;left:14px;bottom:14px;display:flex;gap:8px;font-size:9px;color:var(--retro-muted-fg);text-transform:uppercase;letter-spacing:.07em;z-index:3}
  .statusbar .pill{border:1px solid var(--retro-muted-fg);padding:3px 8px;border-radius:2px;background:var(--retro-bg)}

  /* Zoom control */
  .zoom{position:absolute;right:14px;top:14px;display:flex;flex-direction:column;border:2px solid var(--retro-fg);border-radius:4px;background:var(--retro-bg);z-index:3;box-shadow:3px 3px 0 var(--retro-fg)}
  .zoom button{background:transparent;border:0;border-bottom:2px solid var(--retro-fg);padding:8px 12px;font-family:inherit;font-weight:700;font-size:14px;color:var(--retro-fg);cursor:pointer}
  .zoom button:last-child{border-bottom:0}
  .zoom button:hover{background:var(--retro-fg);color:var(--retro-bg)}
  .zoom .zlevel{font-size:9px;text-align:center;padding:6px;border-bottom:2px solid var(--retro-fg);color:var(--retro-muted-fg);letter-spacing:.06em}
</style>
</head>
<body>
<div class="graph-shell">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="nav">
      <div class="brand"><div class="star"></div>HESPERUS</div>
      <button class="item">DASHBOARD</button>
      <button class="item">CHAT</button>
      <button class="item active">GRAPH</button>
      <div class="search">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input placeholder="// search nodes…" /><span class="mono-small">⌘K</span>
      </div>
      <button class="item" id="darkToggle">☾ DARK</button>
      <button class="item">▌ USER_A</button>
    </div>
  </div>

  <!-- TOOLBAR -->
  <div class="gtoolbar">
    <button class="tool-btn active">
      <span class="ic">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </span>ADD NODE
    </button>
    <button class="tool-btn">
      <span class="ic">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="13 6 19 12 13 18"/></svg>
      </span>ADD CONNECTION
    </button>
    <button class="tool-btn">
      <span class="ic">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </span>EDIT
    </button>
    <button class="tool-btn">
      <span class="ic">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
      </span>DELETE
    </button>
    <div class="tool-spacer"></div>
    <button class="tool-btn tool-icon-only" title="Undo">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/></svg>
    </button>
    <button class="tool-btn tool-icon-only" title="Layout">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    </button>
    <button class="tool-btn tool-icon-only" title="Save">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
    </button>
  </div>

  <!-- CANVAS -->
  <div class="gcanvas">
    <div class="gcanvas-bg"></div>
    <div class="gcanvas-inner" id="canvas">

      <!-- React Components label -->
      <div class="comp-box">
        <div class="lbl">// REACT COMPONENTS:</div>
        <code>NodeEditor</code>
        <code>RelationLink</code>
      </div>

      <!-- ZOOM -->
      <div class="zoom">
        <div class="zlevel">100%</div>
        <button title="Zoom in">+</button>
        <button title="Zoom out">−</button>
      </div>

      <!-- EDGES (SVG) -->
      <svg class="edges" id="edges" preserveAspectRatio="none"></svg>

      <!-- NODES -->
      <div class="node selected" data-id="user" style="left:60px;top:240px">
        <div class="nhead" style="font-size:18px;padding:8px 14px">USER</div>
        <div class="nattr">id</div>
        <div class="nattr">name</div>
        <div class="nattr">email</div>
      </div>

      <div class="node" data-id="category" style="left:300px;top:130px">
        <div class="nhead">CATEGORY</div>
        <div class="nattr">id</div>
        <div class="nattr">name</div>
      </div>

      <div class="node" data-id="payment-top" style="left:560px;top:130px">
        <div class="nhead">PAYMENT</div>
      </div>

      <div class="node" data-id="vendor" style="left:820px;top:130px">
        <div class="nhead">VENDOR</div>
        <div class="nattr">id</div>
        <div class="nattr">name</div>
      </div>

      <div class="node" data-id="product" style="left:300px;top:280px">
        <div class="nhead">PRODUCT</div>
      </div>

      <div class="node" data-id="order" style="left:480px;top:280px">
        <div class="nhead">ORDER</div>
      </div>

      <div class="node" data-id="chippien" style="left:660px;top:270px">
        <div class="nhead" style="font-size:11px">CHIPPIEN</div>
        <div class="nattr">id</div>
        <div class="nattr">SHIPPING</div>
      </div>

      <div class="node" data-id="location" style="left:830px;top:280px">
        <div class="nhead">LOCATION</div>
        <div class="nattr">id</div>
        <div class="nattr">name</div>
      </div>

      <div class="node" data-id="payment-bot" style="left:300px;top:430px">
        <div class="nhead">PAYMENT</div>
        <div class="nattr">id</div>
      </div>

      <div class="node" data-id="review" style="left:540px;top:430px">
        <div class="nhead">REVIEW</div>
      </div>

      <div class="node" data-id="invoice" style="left:830px;top:430px">
        <div class="nhead">INVOICE</div>
      </div>

      <!-- INSPECTOR -->
      <div class="inspector">
        <div class="ihead">// NODE: USER<button class="x" style="background:transparent;border:0;color:var(--retro-bg);cursor:pointer">×</button></div>
        <div class="ibody">
          <div class="row-kv"><b>TYPE</b><span>ENTITY</span></div>
          <div class="row-kv"><b>FIELDS</b><span>3</span></div>
          <div class="row-kv"><b>EDGES</b><span>2 OUT</span></div>
          <input class="input" value="USER" />
          <button class="btn btn-sm">✎ EDIT FIELDS</button>
        </div>
      </div>

      <div class="statusbar">
        <span class="pill">▌ READY</span>
        <span class="pill">11 NODES</span>
        <span class="pill">10 EDGES</span>
        <span class="pill">USER SELECTED</span>
      </div>
    </div>
  </div>
</div>

<script>
  // Edge definitions: from-node -> to-node, with a label and a color
  const edges = [
    { from:'user',        to:'product',     label:'PURCHASED',    color:'#CC6622', side:'right' },
    { from:'user',        to:'payment-bot', label:'',             color:'#7744AA', side:'down'  },
    { from:'category',    to:'order',       label:'BELONGS_TO',   color:'#C4A232' },
    { from:'category',    to:'payment-top', label:'PROCESSED_BY', color:'#8a7e6a' },
    { from:'payment-top', to:'order',       label:'CONTAINS',     color:'#CC6622' },
    { from:'payment-top', to:'vendor',      label:'WROTE',        color:'#7744AA' },
    { from:'product',     to:'order',       label:'CONTAINS',     color:'#5566AA' },
    { from:'order',       to:'chippien',    label:'SHIPPED_TO',   color:'#5C7A28' },
    { from:'chippien',    to:'location',    label:'LOCATED_IN',   color:'#5566AA' },
    { from:'order',       to:'payment-bot', label:'BELONGS_TO',   color:'#5C7A28' },
    { from:'order',       to:'review',      label:'BELONGS_TO',   color:'#AA3322' },
    { from:'payment-bot', to:'review',      label:'WROTE',        color:'#5C7A28' },
    { from:'review',      to:'invoice',     label:'GENERATED',    color:'#AA3322' },
    { from:'vendor',      to:'location',    label:'',             color:'#C4A232', side:'down' },
  ];

  function nodeRect(id) {
    const el = document.querySelector(`.node[data-id="${id}"]`);
    if (!el) return null;
    const cr = document.getElementById('canvas').getBoundingClientRect();
    const r = el.getBoundingClientRect();
    return { x:r.left-cr.left, y:r.top-cr.top, w:r.width, h:r.height,
             cx:r.left-cr.left+r.width/2, cy:r.top-cr.top+r.height/2 };
  }

  function renderEdges() {
    const svg = document.getElementById('edges');
    const cr = document.getElementById('canvas').getBoundingClientRect();
    svg.setAttribute('viewBox', `0 0 ${cr.width} ${cr.height}`);
    svg.setAttribute('width', cr.width);
    svg.setAttribute('height', cr.height);
    svg.innerHTML = '';

    // Remove old labels
    document.querySelectorAll('.elabel').forEach(n => n.remove());

    edges.forEach(e => {
      const a = nodeRect(e.from), b = nodeRect(e.to);
      if (!a || !b) return;
      // Compute connection points on facing edges
      let x1, y1, x2, y2;
      const dx = b.cx - a.cx, dy = b.cy - a.cy;
      if (Math.abs(dx) > Math.abs(dy)) {
        // horizontal
        if (dx > 0) { x1 = a.x+a.w; x2 = b.x; } else { x1 = a.x; x2 = b.x+b.w; }
        y1 = a.cy; y2 = b.cy;
      } else {
        if (dy > 0) { y1 = a.y+a.h; y2 = b.y; } else { y1 = a.y; y2 = b.y+b.h; }
        x1 = a.cx; x2 = b.cx;
      }

      // Thick colored "pipe" — outer dark stroke + inner color, like the inspiration
      const outer = document.createElementNS('http://www.w3.org/2000/svg','line');
      outer.setAttribute('x1',x1); outer.setAttribute('y1',y1);
      outer.setAttribute('x2',x2); outer.setAttribute('y2',y2);
      outer.setAttribute('stroke','var(--retro-fg)');
      outer.setAttribute('stroke-width','14');
      outer.setAttribute('stroke-linecap','butt');
      svg.appendChild(outer);

      const inner = document.createElementNS('http://www.w3.org/2000/svg','line');
      inner.setAttribute('x1',x1); inner.setAttribute('y1',y1);
      inner.setAttribute('x2',x2); inner.setAttribute('y2',y2);
      inner.setAttribute('stroke',e.color);
      inner.setAttribute('stroke-width','10');
      inner.setAttribute('stroke-linecap','butt');
      svg.appendChild(inner);

      // Label
      if (e.label) {
        const mx = (x1+x2)/2, my = (y1+y2)/2;
        const lbl = document.createElement('div');
        lbl.className = 'elabel';
        lbl.textContent = e.label;
        lbl.style.background = e.color;
        lbl.style.left = mx + 'px';
        lbl.style.top = my + 'px';
        lbl.style.transform = 'translate(-50%,-50%)';
        document.getElementById('canvas').appendChild(lbl);
      }
    });
  }

  // Make nodes draggable
  let drag = null;
  document.querySelectorAll('.node').forEach(node => {
    node.addEventListener('mousedown', e => {
      drag = { node, sx: e.clientX, sy: e.clientY,
               ox: parseFloat(node.style.left), oy: parseFloat(node.style.top) };
      node.style.cursor = 'grabbing';
    });
    node.addEventListener('click', () => {
      document.querySelectorAll('.node').forEach(n => n.classList.remove('selected'));
      node.classList.add('selected');
    });
  });
  window.addEventListener('mousemove', e => {
    if (!drag) return;
    drag.node.style.left = (drag.ox + e.clientX - drag.sx) + 'px';
    drag.node.style.top  = (drag.oy + e.clientY - drag.sy) + 'px';
    renderEdges();
  });
  window.addEventListener('mouseup', () => {
    if (drag) drag.node.style.cursor = 'grab';
    drag = null;
  });
  window.addEventListener('resize', renderEdges);
  // Initial render after layout
  requestAnimationFrame(renderEdges);
  setTimeout(renderEdges, 50);

  // Dark mode toggle
  document.getElementById('darkToggle').addEventListener('click', e => {
    document.documentElement.classList.toggle('dark');
    e.currentTarget.textContent = document.documentElement.classList.contains('dark') ? '☀ LIGHT' : '☾ DARK';
    renderEdges();
  });
</script>
</body>
</html>
