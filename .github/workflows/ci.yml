name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [20.x, 22.x]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build package
      run: npm run build:package
    
    - name: Verify package contents
      run: |
        test -f dist/theme.js || exit 1
        test -f dist/theme.d.ts || exit 1
        test -f dist/index.css || exit 1
        echo "✅ Package build verified"
    
    - name: Build demo site
      run: npm run build
      
    - name: Check for TypeScript issues (if any)
      run: |
        if [ -f "tsconfig.json" ]; then
          npm run type-check || echo "No type-check script"
        fi
      continue-on-error: true

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Check package.json validity
      run: npm pkg fix --dry-run
