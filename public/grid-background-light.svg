<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80">
  <defs>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="discrete" tableValues="0 0 0.22 0 0.18 0 0.24 0 0.20 0 0.26 0 0.22 0 0.18 0 0.24 0 0.20"/>
      </feComponentTransfer>
      <feBlend mode="multiply" in2="SourceGraphic"/>
    </filter>
    <filter id="glow" filterUnits="userSpaceOnUse">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#ffffff" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="80" height="80" fill="#ebeacc"/>
  <path d="M 0 50 L 80 50" fill="none" stroke="#f8f7e7" stroke-width="1" opacity="0.5" filter="url(#glow)"/>
  <path d="M 40 0 L 40 80 M 0 40 L 80 40" fill="none" stroke="#b7b096" stroke-width="1.25" filter="url(#glow)"/>
  <rect width="80" height="80" fill="none" filter="url(#noise)"/>
</svg>
