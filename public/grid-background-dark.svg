<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80">
  <defs>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="discrete" tableValues="0 0 0 0 0 0.04 0 0.05 0 0 0.03 0 0 0 0.06 0 0 0 0"/>
      </feComponentTransfer>
      <feBlend mode="screen" in2="SourceGraphic"/>
    </filter>
    <filter id="glow" filterUnits="userSpaceOnUse">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#f8f7e7" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="80" height="80" fill="#222627"/>
  <path d="M 40 0 L 40 80 M 0 40 L 80 40" fill="none" stroke="#494b48" stroke-width="1.25" filter="url(#glow)"/>
  <rect width="80" height="80" fill="none" filter="url(#noise)"/>
</svg>
